<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday 🎉</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">

    <style>
      :root {
        --sage: #7fa99b;
        --terracotta: #c87a65;
        --charcoal: #3e3b39;
        --bg-grad: linear-gradient(135deg, #faf6f0 0%, #e9e5dd 100%);
      }

      body {
        margin: 0;
        background: var(--bg-grad);
        overflow: hidden;
        font-family: 'Comfortaa', cursive;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
      }

      /* Dreamy Ambient Background Elements */
      .bg-decorations {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        pointer-events: none;
        z-index: 1;
      }

      .ambient-orb {
        position: absolute;
        background: rgba(127, 169, 155, 0.12);
        border-radius: 50%;
        animation: floatOrb 12s infinite ease-in-out;
      }

      @keyframes floatOrb {
        0%, 100% { transform: translateY(105vh) translateX(0) scale(1); opacity: 0.3; }
        50% { transform: translateY(10vh) translateX(20px) scale(1.3); opacity: 0.8; }
        80% { opacity: 0; }
      }

      /* Elegant Typographic Banner */
      .happy-birthday-banner {
        text-align: center;
        margin-top: 55px;
        font-size: 28px;
        font-weight: 500;
        color: var(--sage);
        letter-spacing: 1px;
        z-index: 2;
        line-height: 1.4;
      }

      .happy-birthday-banner div {
        font-family: 'Playfair Display', serif;
        font-style: italic;
        font-size: 56px;
        font-weight: 600;
        color: var(--terracotta);
        margin-top: 8px;
        letter-spacing: 0px;
        text-shadow: 2px 2px 0px #fff;
      }

      /* Clean Rounded Counter Card */
      .candle-count-display {
        text-align: center;
        margin: 15px auto;
        font-size: 13px;
        letter-spacing: 0.5px;
        font-weight: 700;
        background: rgba(255, 255, 255, 0.85);
        border: 1px solid rgba(127, 169, 155, 0.25);
        padding: 8px 22px;
        border-radius: 40px;
        width: fit-content;
        color: var(--charcoal);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.02);
        z-index: 2;
      }

      .candle-count-display span {
        color: var(--terracotta);
        font-size: 15px;
        margin-left: 2px;
      }

      /* Cake Container Layout Setup */
      .cake-container {
        z-index: 2;
        margin: 35px auto;
      }

      .cake {
        position: relative;
        width: 250px;
        height: 200px;
        cursor: pointer;
      }

      .plate {
        width: 270px;
        height: 110px;
        position: absolute;
        bottom: -10px;
        left: -10px;
        background-color: #f2e6f8;
        border-radius: 50%;
        box-shadow: 0 2px 0 #f2e6f8, 0 4px 0 #f2e6f8, 0 5px 40px rgba(0, 0, 0, 0.5);
      }

      .layer {
        display: block;
        width: 250px;
        height: 100px;
        border-radius: 50%;
        background: #cf9e72;
        position: absolute;
      }

      .layer-top { top: 0; }
      .layer-middle { top: 33px; }
      .layer-bottom { top: 66px; }

      .icing {
        top: 2px;
        left: 5px;
        background-color: #5d3a1a;
        width: 240px;
        height: 90px;
        border-radius: 50%;
        position: absolute;
        z-index: 1;
      }
      .icing:before {
        content: "";
        position: absolute;
        top: 4px;
        right: 5px;
        bottom: 6px;
        left: 5px;
        background-color: #5d3a1a;
        border-radius: 50%;
        box-shadow: 0 0 10px rgba(91, 58, 35, 0.45), 0 0 10px rgba(116, 78, 45, 0.35);
        z-index: 1;
      }

      .drip {
        width: 50px;
        height: 60px;
        border-bottom-left-radius: 25px;
        border-bottom-right-radius: 25px;
        background-color: #5d3a1a;
        position: absolute;
      }

      .drip1 { top: 53px; left: 5px; transform: skewY(15deg); height: 48px; width: 40px; }
      .drip2 { top: 69px; left: 181px; transform: skewY(-15deg); }
      .drip3 { top: 54px; left: 90px; width: 80px; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; }

      .candle {
        background-color: #7B020B;
        width: 12px;
        height: 35px;
        border-radius: 6px/3px;
        position: absolute;
        top: -20px;
        z-index: 10;
      }
      .candle:before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 12px;
        height: 6px;
        border-radius: 50%;
        background-color: #ad030f;
      }

      .flame {
        position: absolute;
        background-color: orange;
        width: 10px;
        height: 25px;
        border-radius: 8px 8px 8px 8px/20px 20px 8px 8px;
        top: -34px;
        left: 50%;
        margin-left: -7.5px;
        z-index: 10;
        box-shadow: 0 0 10px rgba(255, 165, 0, 0.5), 0 0 20px rgba(255, 165, 0, 0.5);
        animation: flicker 1s ease-in-out alternate infinite;
        transform-origin: 50% 90%;
      }
      
      .candle.out .flame { display: none; }

      @keyframes flicker {
        0% { transform: skewX(5deg); }
        25% { transform: skewX(-5deg); }
        50% { transform: skewX(10deg); }
        75% { transform: skewX(-10deg); }
        100% { transform: skewX(5deg); }
      }

      #confettiCanvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 0;
        pointer-events: none;
      }

      .audio-container {
        display: none;
      }

      /* Sophisticated Custom Action Button */
      .read-letter-button {
        position: fixed;
        bottom: 50px;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        z-index: 99;
      }

      .read-letter-button a {
        background: var(--terracotta);
        padding: 14px 40px;
        border-radius: 50px;
        color: #fff;
        text-decoration: none;
        font-weight: 700;
        font-size: 13px;
        letter-spacing: 1px;
        box-shadow: 0 8px 24px rgba(200, 122, 101, 0.25);
        transition: all 0.4s ease;
        display: inline-block;
      }

      .read-letter-button a:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 30px rgba(200, 122, 101, 0.4);
        background: #ba6b56;
      }

      .read-letter-button a span {
        margin-left: 6px;
        display: inline-block;
        transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      .read-letter-button a:hover span {
        transform: scale(1.25) rotate(10deg);
      }
    </style>
  </head>
  <body>
    <div class="bg-decorations">
      <div class="ambient-orb" style="left: 10%; width: 40px; height: 40px; animation-delay: 0s; animation-duration: 10s;"></div>
      <div class="ambient-orb" style="left: 30%; width: 25px; height: 25px; animation-delay: 3s; animation-duration: 14s; background: rgba(200, 122, 101, 0.08);"></div>
      <div class="ambient-orb" style="left: 75%; width: 50px; height: 50px; animation-delay: 1s; animation-duration: 11s;"></div>
      <div class="ambient-orb" style="left: 85%; width: 30px; height: 30px; animation-delay: 5s; animation-duration: 13s; background: rgba(200, 122, 101, 0.08);"></div>
    </div>

    <canvas id="confettiCanvas"></canvas>
    
    <div class="happy-birthday-banner">
      Happy Birthday 
      <div>Kimberly Nicole</div>
    </div>
    
    <div class="candle-count-display">
      Candles Active: <span id="candleCount">0</span>
    </div>
    
    <div class="cake-container">
      <div class="cake">
        <div class="plate"></div>
        <div class="layer layer-bottom"></div>
        <div class="layer layer-middle"></div>
        <div class="layer layer-top"></div>
        <div class="icing"></div>
        <div class="drip drip1"></div>
        <div class="drip drip2"></div>
        <div class="drip drip3"></div>
      </div>
    </div>

    <div class="audio-container">
      <audio id="birthdayAudio" loop>
        <source src="birthday.mp3" type="audio/mpeg" />
      </audio>
    </div>

    <script>
      const canvas = document.getElementById("confettiCanvas");
      const ctx = canvas.getContext("2d");
      const bgAudio = document.getElementById("birthdayAudio");
      let musicStarted = false;

      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      });

      const confettiCount = 90;
      const confetti = [];
      const colors = ["#7fa99b", "#c87a65", "#dca99a", "#f3e1dc", "#cfc2b3"];

      for (let i = 0; i < confettiCount; i++) {
        confetti.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: Math.random() * 3.5 + 2.5,
          d: Math.random() * confettiCount,
          color: colors[Math.floor(Math.random() * colors.length)],
          tilt: Math.floor(Math.random() * 6) - 6,
          tiltAngleIncremental: Math.random() * 0.04 + 0.02,
          tiltAngle: 0
        });
      }

      function drawConfetti() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < confettiCount; i++) {
          const c = confetti[i];
          ctx.beginPath();
          ctx.lineWidth = c.r / 2;
          ctx.strokeStyle = c.color;
          ctx.moveTo(c.x + c.tilt + c.r / 4, c.y);
          ctx.lineTo(c.x + c.tilt, c.y + c.tilt + c.r / 4);
          ctx.stroke();
        }
        updateConfetti();
      }

      function updateConfetti() {
        for (let i = 0; i < confettiCount; i++) {
          const c = confetti[i];
          c.tiltAngle += c.tiltAngleIncremental;
          c.y += (Math.cos(c.d) + 2.2 + c.r / 2) / 2.5;
          c.x += Math.sin(c.d) * 0.5;
          c.tilt = Math.sin(c.tiltAngle) * 8;

          if (c.y > canvas.height) {
            c.y = -10;
            c.x = Math.random() * canvas.width;
          }
        }
      }

      (function animateConfetti() {
        requestAnimationFrame(animateConfetti);
        drawConfetti();
      })();

      document.addEventListener("DOMContentLoaded", function () {
        const cake = document.querySelector(".cake");
        const candleCountDisplay = document.getElementById("candleCount");
        let candles = [];

        function updateCandleCount() {
          const activeCandles = candles.filter(
            (candle) => !candle.classList.contains("out")
          ).length;
          candleCountDisplay.textContent = activeCandles;
        }

        function addCandle(left, top) {
          const candle = document.createElement("div");
          candle.className = "candle";
          candle.style.left = left + "px";
          candle.style.top = top + "px";

          const flame = document.createElement("div");
          flame.className = "flame";
          candle.appendChild(flame);

          cake.appendChild(candle);
          candles.push(candle);
          updateCandleCount();
        }

        cake.addEventListener("click", function (event) {
          if (!musicStarted) {
            bgAudio.play().catch(error => console.log("Audio waiting for user gesture:", error));
            musicStarted = true;
          }

          const rect = cake.getBoundingClientRect();
          const left = event.clientX - rect.left;
          const top = event.clientY - rect.top;
          addCandle(left, top);
        });
      });

      // Mic volume threshold detection logic
      navigator.mediaDevices.getUserMedia({ audio: true })
        .then(function(stream) {
          const audioContext = new (window.AudioContext || window.webkitAudioContext)();
          const source = audioContext.createMediaStreamSource(stream);
          const analyser = audioContext.createAnalyser();
          source.connect(analyser);
          analyser.fftSize = 512;
    
          const dataArray = new Uint8Array(analyser.frequencyBinCount);
    
          function checkVolume() {
            analyser.getByteFrequencyData(dataArray);
            const volume = dataArray.reduce((a, b) => a + b) / dataArray.length;
    
            if (volume > 60) {
              blowOutCandles();
            }
    
            requestAnimationFrame(checkVolume);
          }
    
          checkVolume();
        })
        .catch(function(err) {
          console.error("Microphone hardware access needed:", err);
        });
    
      function blowOutCandles() {
        const candles = document.querySelectorAll(".candle");
        candles.forEach(candle => {
          candle.classList.add("out");
        });
        document.getElementById("candleCount").textContent = 0;
      }
    </script>

    <div class="read-letter-button">
      <a href="letter.html">Read My Letter <span>💌</span></a>
    </div>
  </body>
</html>
